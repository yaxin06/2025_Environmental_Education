<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地生系環教周成果網站</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans TC", sans-serif;
      background: #0b0d0c;
      color: #fff;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #333;
      z-index: 100;
    }

    h1 {
      font-size: 40px;
      text-align: center;
      margin-top: 40px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #141716;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #7ddf83;
      cursor: pointer;
      font-weight: bold;
    }

    .gallery img {
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* lightbox */
    #lightbox {
      position: fixed;
      display: none;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
    }

    #lightbox img {
      max-width: 80%;
      max-height: 80%;
    }

  </style>
</head>

<body>

<header>🌿 地生系環教周成果網站</header>

<h1>永續未來・森生不息</h1>

<div class="container">

  <!-- 活動 -->
  <div class="card">
    <h2>🌱 DIY 植栽苔球</h2>
    <p>減塑 × 自然共生</p>

    <div class="grid gallery">
      <img src="https://huggingface.co/spaces/yaxinnnn/2025_Environmental_Education/resolve/main/%E8%9E%A2%E5%B9%95%E6%93%B7%E5%8F%96%E7%95%AB%E9%9D%A2%202026-04-21%20135208.png">
      <img src="https://huggingface.co/spaces/yaxinnnn/2025_Environmental_Education/resolve/main/%E8%9E%A2%E5%B9%95%E6%93%B7%E5%8F%96%E7%95%AB%E9%9D%A2%202026-04-21%20135219.png">
    </div>
  </div>

  <div class="card">
    <h2>🌳 碳為觀植</h2>
    <p>碳足跡 × 森林</p>

    <div class="grid gallery">
      <img src="https://huggingface.co/spaces/yaxinnnn/2025_Environmental_Education/resolve/main/%E8%9E%A2%E5%B9%95%E6%93%B7%E5%8F%96%E7%95%AB%E9%9D%A2%202026-04-21%20135700.png">
      <img src="https://huggingface.co/spaces/yaxinnnn/2025_Environmental_Education/resolve/main/%E8%9E%A2%E5%B9%95%E6%93%B7%E5%8F%96%E7%95%AB%E9%9D%A2%202026-04-21%20135707.png">
    </div>
  </div>

  <!-- 小測驗 -->
  <div class="card">
    <h2>🧠 小測驗</h2>
    <p id="question">苔球主要概念是？</p>

    <button onclick="check(0)">大量使用塑膠</button>
    <button onclick="check(1)">減塑自然</button>
    <button onclick="check(2)">裝飾為主</button>

    <p id="result"></p>
  </div>

</div>

<!-- lightbox -->
<div id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>
  // lightbox
  document.querySelectorAll(".gallery img").forEach(img => {
    img.onclick = () => {
      document.getElementById("lightbox").style.display = "flex";
      document.getElementById("lightbox-img").src = img.src;
    }
  });

  // quiz
  function check(ans){
    const result = document.getElementById("result");
    if(ans === 1){
      result.innerHTML = "✔ 正確！";
    }else{
      result.innerHTML = "✘ 再想想！";
    }
  }
</script>

</body>
</html>
